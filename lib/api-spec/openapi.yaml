openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CareerPath AI - Career Counselling Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication endpoints
  - name: profiles
    description: User career profile operations
  - name: assessments
    description: Career assessment and test operations
  - name: careers
    description: Career suggestions and roadmap operations
  - name: openai
    description: OpenAI AI chat operations
  - name: community
    description: Community directory and social features
paths:
  /auth/user:
    get:
      tags: [auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect on success or failure.
  /logout:
    get:
      tags: [auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /community/members:
    get:
      operationId: getCommunityMembers
      tags: [community]
      summary: List all community members who have completed assessments
      responses:
        "200":
          description: List of community members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityMember"

  /profiles/{id}/public:
    get:
      operationId: getPublicProfile
      tags: [community]
      summary: Get a public view of a profile with career suggestions and roadmap progress
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Public profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProfile"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /profiles/{id}/comments:
    get:
      operationId: getProfileComments
      tags: [community]
      summary: Get comments on a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfileComment"
    post:
      operationId: addProfileComment
      tags: [community]
      summary: Add a comment to a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileCommentInput"
      responses:
        "201":
          description: Comment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileComment"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /profiles/{id}/progress:
    get:
      operationId: getRoadmapProgress
      tags: [community]
      summary: Get roadmap progress for a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: career
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Roadmap progress entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgressEntry"
    put:
      operationId: updateRoadmapProgress
      tags: [community]
      summary: Toggle a roadmap milestone as complete or incomplete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressUpdate"
      responses:
        "200":
          description: Progress updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressEntry"

  /profiles/{id}/skills:
    get:
      operationId: getProfileSkills
      tags: [community]
      summary: Get all skills for a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSkill"
    post:
      operationId: addProfileSkill
      tags: [community]
      summary: Add or update a skill on a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillInput"
      responses:
        "201":
          description: Skill added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSkill"

  /profiles/{id}/skills/{skillId}/test:
    post:
      operationId: runSkillTest
      tags: [community]
      summary: Run an AI-generated skill test and return the assessed level with advice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: skillId
          in: path
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillTestSubmission"
      responses:
        "200":
          description: Skill test result with advice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillTestResult"
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profiles:
    post:
      operationId: createProfile
      tags: [profiles]
      summary: Create a new user career profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileInput"
      responses:
        "201":
          description: Created profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    get:
      operationId: listProfiles
      tags: [profiles]
      summary: List all profiles
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"

  /profiles/{id}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get a profile by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Profile with career data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateProfile
      tags: [profiles]
      summary: Update a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /assessments:
    post:
      operationId: createAssessment
      tags: [assessments]
      summary: Start a new career assessment for a profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentInput"
      responses:
        "201":
          description: Created assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assessment"

  /assessments/{id}:
    get:
      operationId: getAssessment
      tags: [assessments]
      summary: Get assessment with questions and answers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assessment with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentWithQuestions"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /assessments/{id}/submit:
    post:
      operationId: submitAssessment
      tags: [assessments]
      summary: Submit answers for an assessment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessmentSubmission"
      responses:
        "200":
          description: Assessment result with career suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentResult"

  /profiles/{id}/career-suggestions:
    get:
      operationId: getCareerSuggestions
      tags: [careers]
      summary: Get AI-generated career suggestions for a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of career suggestions with honest analysis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CareerSuggestion"

  /profiles/{id}/roadmap:
    get:
      operationId: getCareerRoadmap
      tags: [careers]
      summary: Get a detailed career roadmap for a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: career
          in: query
          required: false
          schema:
            type: string
          description: Target career title — if omitted, defaults to the top suggested career
      responses:
        "200":
          description: Career roadmap with milestones
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerRoadmap"

  /community/insights:
    get:
      operationId: getCommunityInsights
      tags: [profiles]
      summary: Aggregated community stats — answer distributions, top careers, strengths, score spread
      parameters:
        - name: profileId
          in: query
          required: false
          schema:
            type: integer
          description: When provided, includes this profile's own answers alongside community data
      responses:
        "200":
          description: Community insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityInsights"

  /profiles/{id}/assessment-result:
    get:
      operationId: getProfileAssessmentResult
      tags: [assessments]
      summary: Get the completed assessment result (analysis, strengths, weaknesses) for a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Completed assessment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredAssessmentResult"
        "404":
          description: No completed assessment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /profiles/{id}/summary:
    get:
      operationId: getProfileSummary
      tags: [profiles]
      summary: Get a quick summary with top career match and assessment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Profile summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileSummary"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all AI counselling conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new AI counselling conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a message and receive a streaming AI response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Profile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: ["integer", "null"]
        educationLevel:
          type: string
        fieldOfStudy:
          type: ["string", "null"]
        workExperience:
          type: ["string", "null"]
        skills:
          type: ["string", "null"]
        interests:
          type: ["string", "null"]
        goals:
          type: ["string", "null"]
        conversationId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - educationLevel
        - createdAt
        - updatedAt

    ProfileInput:
      type: object
      properties:
        name:
          type: string
        age:
          type: integer
        educationLevel:
          type: string
        fieldOfStudy:
          type: string
        workExperience:
          type: string
        skills:
          type: string
        interests:
          type: string
        goals:
          type: string
      required:
        - name
        - educationLevel

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        age:
          type: integer
        educationLevel:
          type: string
        fieldOfStudy:
          type: string
        workExperience:
          type: string
        skills:
          type: string
        interests:
          type: string
        goals:
          type: string

    ProfileSummary:
      type: object
      properties:
        profileId:
          type: integer
        name:
          type: string
        topCareerMatch:
          type: ["string", "null"]
        compatibilityScore:
          type: ["integer", "null"]
        assessmentCompleted:
          type: boolean
        totalConversations:
          type: integer
        lastActivity:
          type: ["string", "null"]
          format: date-time
      required:
        - profileId
        - name
        - assessmentCompleted
        - totalConversations

    Assessment:
      type: object
      properties:
        id:
          type: integer
        profileId:
          type: integer
        status:
          type: string
          enum: [pending, completed]
        score:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - profileId
        - status
        - createdAt

    ScoreBucket:
      type: object
      properties:
        range:
          type: string
        count:
          type: integer
      required: [range, count]

    CareerStat:
      type: object
      properties:
        careerTitle:
          type: string
        count:
          type: integer
        avgCompatibilityScore:
          type: number
      required: [careerTitle, count, avgCompatibilityScore]

    FrequencyItem:
      type: object
      properties:
        label:
          type: string
        count:
          type: integer
      required: [label, count]

    QuestionBreakdown:
      type: object
      properties:
        questionText:
          type: string
        questionType:
          type: string
        answers:
          type: array
          items:
            $ref: "#/components/schemas/FrequencyItem"
        myAnswer:
          type: ["string", "null"]
      required: [questionText, questionType, answers]

    CommunityInsights:
      type: object
      properties:
        totalMembers:
          type: integer
        assessmentsCompleted:
          type: integer
        avgScore:
          type: number
        myScore:
          type: ["integer", "null"]
        scoreDistribution:
          type: array
          items:
            $ref: "#/components/schemas/ScoreBucket"
        topCareers:
          type: array
          items:
            $ref: "#/components/schemas/CareerStat"
        topStrengths:
          type: array
          items:
            $ref: "#/components/schemas/FrequencyItem"
        topAreasToImprove:
          type: array
          items:
            $ref: "#/components/schemas/FrequencyItem"
        questionBreakdowns:
          type: array
          items:
            $ref: "#/components/schemas/QuestionBreakdown"
        textResponses:
          type: array
          items:
            $ref: "#/components/schemas/TextResponseGroup"
      required:
        - totalMembers
        - assessmentsCompleted
        - avgScore
        - scoreDistribution
        - topCareers
        - topStrengths
        - topAreasToImprove
        - questionBreakdowns
        - textResponses

    TextResponseItem:
      type: object
      properties:
        displayName:
          type: string
        text:
          type: string
      required: [displayName, text]

    TextResponseGroup:
      type: object
      properties:
        questionText:
          type: string
        responses:
          type: array
          items:
            $ref: "#/components/schemas/TextResponseItem"
      required: [questionText, responses]

    StoredAssessmentResult:
      type: object
      properties:
        assessmentId:
          type: integer
        profileId:
          type: integer
        score:
          type: integer
        analysis:
          type: string
        topStrengths:
          type: array
          items:
            type: string
        areasToImprove:
          type: array
          items:
            type: string
        completedAt:
          type: string
          format: date-time
      required:
        - assessmentId
        - profileId
        - score
        - analysis
        - topStrengths
        - areasToImprove
        - completedAt

    AssessmentInput:
      type: object
      properties:
        profileId:
          type: integer
      required:
        - profileId

    AssessmentQuestion:
      type: object
      properties:
        id:
          type: integer
        assessmentId:
          type: integer
        questionText:
          type: string
        questionType:
          type: string
          enum: [multiple_choice, multiple_select, scale, text]
        options:
          type: ["string", "null"]
        answer:
          type: ["string", "null"]
        orderIndex:
          type: integer
      required:
        - id
        - assessmentId
        - questionText
        - questionType
        - orderIndex

    AssessmentWithQuestions:
      type: object
      properties:
        id:
          type: integer
        profileId:
          type: integer
        status:
          type: string
        score:
          type: ["integer", "null"]
        analysis:
          type: ["string", "null"]
        topStrengths:
          type: ["string", "null"]
        areasToImprove:
          type: ["string", "null"]
        questions:
          type: array
          items:
            $ref: "#/components/schemas/AssessmentQuestion"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - profileId
        - status
        - questions
        - createdAt

    QuestionAnswer:
      type: object
      properties:
        questionId:
          type: integer
        answer:
          type: string
      required:
        - questionId
        - answer

    AssessmentSubmission:
      type: object
      properties:
        answers:
          type: array
          items:
            $ref: "#/components/schemas/QuestionAnswer"
      required:
        - answers

    AssessmentResult:
      type: object
      properties:
        assessmentId:
          type: integer
        score:
          type: integer
        analysis:
          type: string
        topStrengths:
          type: array
          items:
            type: string
        areasToImprove:
          type: array
          items:
            type: string
        careerSuggestions:
          type: array
          items:
            $ref: "#/components/schemas/CareerSuggestion"
      required:
        - assessmentId
        - score
        - analysis
        - topStrengths
        - areasToImprove
        - careerSuggestions

    CareerSuggestion:
      type: object
      properties:
        id:
          type: integer
        profileId:
          type: integer
        careerTitle:
          type: string
        compatibilityScore:
          type: integer
        description:
          type: string
        pros:
          type: array
          items:
            type: string
        cons:
          type: array
          items:
            type: string
        requiredSkills:
          type: array
          items:
            type: string
        salaryRange:
          type: string
        timeToAchieve:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - profileId
        - careerTitle
        - compatibilityScore
        - description
        - pros
        - cons
        - requiredSkills
        - salaryRange
        - timeToAchieve
        - createdAt

    RoadmapMilestone:
      type: object
      properties:
        phase:
          type: integer
        title:
          type: string
        description:
          type: string
        duration:
          type: string
        actions:
          type: array
          items:
            type: string
      required:
        - phase
        - title
